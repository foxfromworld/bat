name: Docker Image CI

on:
  push:
    branches: [ master ]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: version
        run: echo "BAT_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=${{ env.BAT_VERSION }}
          fi

          echo "Building bat version: $VERSION"

          docker build \
            --build-arg BAT_VERSION=$VERSION \
            -t ghcr.io/foxfromworld/bat:$VERSION .

      - name: Push Docker image
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=${{ env.BAT_VERSION }}
          fi

          docker push ghcr.io/foxfromworld/bat:$VERSION
