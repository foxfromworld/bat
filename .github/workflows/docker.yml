name: Docker Image CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build Docker image
        run: |
          docker build \
            --build-arg BAT_VERSION=${{ github.ref_name }} \
            -t ghcr.io/foxfromworld/bat:${{ github.ref_name }} .

      - name: Push Docker image
        run: docker push ghcr.io/foxfromworld/bat:${{ github.ref_name }}
